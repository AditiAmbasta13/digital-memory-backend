services:
  - type: web
    name: digital-memory-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_NAME
        value: Digital Memory System
      - key: DEBUG
        value: "false"
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_data
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: SPACY_MODEL
        value: en_core_web_sm
      # --- Set these in the Render dashboard (do NOT put secrets here) ---
      # NEO4J_URI, NEO4J_USER, NEO4J_PASSWORD
      # GROQ_API_KEY
      # MONGO_URI, MONGO_DB_NAME
      # ALLOWED_ORIGINS (your Vercel URL)
      # DATABASE_URL (default: sqlite:///./digital_memory.db)
